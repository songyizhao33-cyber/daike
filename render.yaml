# Render 部署配置文件
# 单服务部署：后端服务前端静态文件

services:
  # 统一服务（后端 + 前端）
  - type: web
    name: daike
    env: node
    region: singapore
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # 需要在 Render 控制台手动设置
      - key: JWT_SECRET
        sync: false  # 需要在 Render 控制台手动设置
    healthCheckPath: /
